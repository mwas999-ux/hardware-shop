<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Mwangi Hardware</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Poppins, sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: min(460px, 100%);
            box-shadow: 0 18px 45px rgba(0, 0, 0, .12);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff6a00, #ff3d2e);
            display: grid;
            place-items: center;
            color: white;
            font-size: 1.2rem;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1rem;
        }

        .logo-text small {
            display: block;
            color: #6b7280;
            font-weight: 400;
            font-size: .8rem
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        p.sub {
            color: #6b7280;
            font-size: .9rem;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px
        }

        label {
            display: block;
            font-weight: 600;
            font-size: .88rem;
            margin-bottom: 7px
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 14px;
            border: 1.5px solid #e5e7eb;
            outline: none;
            font-family: Poppins, sans-serif;
            font-size: .95rem;
            transition: border .2s;
        }

        input:focus {
            border-color: #ff6a00;
            box-shadow: 0 0 0 3px rgba(255, 106, 0, .12)
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #ff6a00, #ff3d2e);
            color: white;
            font-family: Poppins, sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all .3s;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: .95rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
            z-index: 9999;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #ff6a00;
            font-weight: 600;
            font-size: .88rem;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">
            <div class="logo-mark">🔨</div>
            <div class="logo-text">
                MWANGI HARDWARE
                <small>Building Kenya Starts Here</small>
            </div>
        </div>

        <h2>🔐 Reset Your Password</h2>
        <p class="sub">Enter your new password below to regain access to your account.</p>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your new password">
        </div>

        <button class="btn" id="resetBtn" onclick="doReset()">
            Reset Password
        </button>

        <a href="https://freddymwas.netlify.app" class="back-link">← Back to Store</a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'https://hardware-shop-ksvk.onrender.com';

        // Get token from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            showToast('Invalid reset link. Please request a new one.', 'error');
        }

        async function doReset() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!password || !confirm) {
                showToast('Please fill in both fields.', 'error');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters.', 'error');
                return;
            }
            if (password !== confirm) {
                showToast('Passwords do not match.', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Reset failed. Please try again.', 'error');
                    return;
                }

                showToast('Password reset successfully! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'https://freddymwas.netlify.app';
                }, 2000);

            } catch (e) {
                showToast('Connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'success' ? '#16a34a' : '#ef4444';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3500);
        }
    </script>

</body>

</html>
