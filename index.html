<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #e65c00;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 28px;
        }

        header p {
            font-size: 14px;
            margin-top: 5px;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .product-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
        }

        .category {
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: #e65c00;
            margin-bottom: 8px;
        }

        .stock {
            font-size: 12px;
            color: #555;
            margin-bottom: 15px;
        }

        .order-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }

        .order-btn:hover {
            background: #1ebe57;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>

<body>

    <header>
        <h1>🔨 Kamau Hardware Shop</h1>
        <p>Quality building materials at the best prices</p>
    </header>

    <div class="container">
        <h2>Our Products</h2>
        <div class="products-grid" id="products-grid">
            <p class="loading">Loading products...</p>
        </div>
    </div>

    <script>
        fetch('https://hardware-shop-ksvk.onrender.com/products')
            .then(res => res.json())
            .then(products => {
                const grid = document.getElementById('products-grid');
                grid.innerHTML = '';

                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
            <h3>${product.name}</h3>
            <p class="category">${product.category}</p>
            <p class="price">KES ${product.price}</p>
            <p class="stock">Stock: ${product.stock} units</p>
            <button class="order-btn" onclick="orderProduct('${product.name}', '${product.price}')">
              🛒 Order via WhatsApp
            </button>
          `;
                    grid.appendChild(card);
                });
            })
            .catch(err => {
                document.getElementById('products-grid').innerHTML =
                    '<p class="loading">Failed to load products.</p>';
            });

        function orderProduct(name, price) {
            const message = `Hello, I'd like to order: ${name} - KES ${price}`;
            const whatsappURL = `https://wa.me/254700000000?text=${encodeURIComponent(message)}`;
            window.open(whatsappURL);
        }
    </script>

</body>

</html>
